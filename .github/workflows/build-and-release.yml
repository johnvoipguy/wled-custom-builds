name: Build and Release seeed_xiao_esp32s3v2

on:
  push:
    branches: [seeed-xiao-16.0.0]
    paths:
      - 'platformio.ini'
      - 'platformio_release.ini'
      - 'wled00/**'
      - 'usermods/**'
      - 'lib/**'
      - 'include/**'
      - 'tools/**'
      - 'scripts/**'
      - 'targets/**'
      - '.github/workflows/build-and-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_NAME: seeed-xiao-esp32s3
      TARGET_VERSION: v16
      PIO_ENV: seeed_xiao_esp32s3v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO and esptool
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: Build target firmware
        id: build_target
        run: |
          scripts/build-target.sh \
            --target "$TARGET_NAME" \
            --version "$TARGET_VERSION" \
            --environment "$PIO_ENV" \
            --keep-workspace

      - name: Prepare firmware packages
        id: package
        env:
          BUILD_WORKSPACE: ${{ steps.build_target.outputs.workspace }}
        run: |
          set -euo pipefail

          BUILD_DIR="$BUILD_WORKSPACE/.pio/build/$PIO_ENV"
          OUT_DIR="$RUNNER_TEMP/release-assets"

          mkdir -p "$OUT_DIR"

          echo "📦 Packaging binaries from: $BUILD_DIR"
          ls -la "$BUILD_DIR"

          if [ ! -f "$BUILD_DIR/firmware.bin" ]; then
            echo "❌ firmware.bin was not produced"
            exit 1
          fi

          FULL_BIN="$OUT_DIR/WLED_${PIO_ENV}_Full_Latest.bin"
          APP_BIN="$OUT_DIR/WLED_${PIO_ENV}_App_Latest.bin"
          BUILD_INFO="$OUT_DIR/BUILD_INFO.txt"

          if [ -f "$BUILD_DIR/bootloader.bin" ] && [ -f "$BUILD_DIR/partitions.bin" ]; then
            python -m esptool --chip esp32s3 merge-bin -o "$FULL_BIN" \
              --flash-mode qio --flash-size 8MB \
              0x0000 "$BUILD_DIR/bootloader.bin" \
              0x8000 "$BUILD_DIR/partitions.bin" \
              0x10000 "$BUILD_DIR/firmware.bin"
          else
            cp "$BUILD_DIR/firmware.bin" "$FULL_BIN"
          fi

          cp "$BUILD_DIR/firmware.bin" "$APP_BIN"
          [ -f "$BUILD_DIR/bootloader.bin" ] && cp "$BUILD_DIR/bootloader.bin" "$OUT_DIR/Bootloader.bin"
          [ -f "$BUILD_DIR/partitions.bin" ] && cp "$BUILD_DIR/partitions.bin" "$OUT_DIR/Partitions.bin"
          cp "$BUILD_DIR/firmware.bin" "$OUT_DIR/App.bin"

          {
            echo "$PIO_ENV WLED Firmware Build"
            echo "=========================="
            echo "Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit: ${GITHUB_SHA}"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo ""
            echo "FILES:"
            ls -lh "$OUT_DIR"
            echo ""
            echo "FLASHING INSTRUCTIONS:"
            echo "======================"
            echo ""
            echo "UART Flashing (first install):"
            echo "esptool.py --chip esp32s3 write-flash 0x0000 WLED_${PIO_ENV}_Full_Latest.bin"
            echo ""
            echo "OTA update:"
            echo "- Upload WLED_${PIO_ENV}_App_Latest.bin via WLED web interface"
            echo "- Settings > Security & Updates > Manual OTA"
          } > "$BUILD_INFO"

          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PIO_ENV }}-firmware
          path: ${{ steps.package.outputs.out_dir }}/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/seeed-xiao-16.0.0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASE_TAG="${PIO_ENV}-v$(date +%Y%m%d-%H%M%S)"
          RELEASE_NAME="${PIO_ENV} WLED Firmware - $(date +'%Y-%m-%d %H:%M')"
          OUT_DIR="${{ steps.package.outputs.out_dir }}"

          gh release create "$RELEASE_TAG" \
            "$OUT_DIR/WLED_${PIO_ENV}_Full_Latest.bin#${PIO_ENV} Full Firmware (UART Flash)" \
            "$OUT_DIR/WLED_${PIO_ENV}_App_Latest.bin#${PIO_ENV} App Only (OTA Update)" \
            "$OUT_DIR/BUILD_INFO.txt#Build Information" \
            --title "$RELEASE_NAME" \
            --notes "Built from commit ${GITHUB_SHA:0:7}." \
            --latest
