name: Build Target Firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target directory under targets/
        required: true
        default: seeed-xiao-esp32s3
      version:
        description: Target version directory (for example v16)
        required: true
        default: v16
      environment:
        description: Optional PlatformIO environment (auto-detected from target platformio.env.ini or platformio-env.ini when empty)
        required: false
        default: ""
      create_release:
        description: Create a GitHub Release from this build
        required: false
        type: boolean
        default: false
      legacy_release:
        description: Mark release as LEGACY (prerelease, not latest)
        required: false
        type: boolean
        default: false
      release_tag:
        description: Optional release tag override
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-target.yml
      - targets/**
  pull_request:
    paths:
      - .github/workflows/build-target.yml
      - targets/**

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      count: ${{ steps.resolve.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target/version build matrix
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ github.event.inputs.target || 'seeed-xiao-esp32s3' }}
          INPUT_VERSION: ${{ github.event.inputs.version || 'v16' }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          PUSH_AFTER_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          repo_root = pathlib.Path('.').resolve()
          targets_root = repo_root / 'targets'
          event_name = os.environ.get('EVENT_NAME', '')

          def run_cmd(cmd):
            result = subprocess.run(cmd, capture_output=True, text=True, check=False)
            if result.returncode != 0:
              return []
            return [line.strip() for line in result.stdout.splitlines() if line.strip()]

          def is_version_overlay_dir(path_obj):
            if not path_obj.is_dir():
              return False
            if path_obj.name in {'shared', '.git'}:
              return False
            markers = [
              path_obj / 'build.json',
              path_obj / 'build-old.json',
              path_obj / 'platformio.env.ini',
              path_obj / 'platformio-env.ini',
              path_obj / 'notes.md',
            ]
            return any(marker.exists() for marker in markers)

          def versions_for_target(target_name):
            target_dir = targets_root / target_name
            if not target_dir.is_dir():
              return []
            versions = []
            for child in sorted(target_dir.iterdir()):
              if is_version_overlay_dir(child):
                versions.append(child.name)
            return versions

          def manifest_environment(target_name, version_name):
            manifest_path = targets_root / target_name / version_name / 'build.json'
            if not manifest_path.is_file():
              return ''
            try:
              with manifest_path.open(encoding='utf-8') as fp:
                payload = json.load(fp)
            except Exception:
              return ''
            value = payload.get('environment', '')
            return value if isinstance(value, str) else str(value)

          def manifest_wled_ref(target_name, version_name):
            manifest_path = targets_root / target_name / version_name / 'build.json'
            if not manifest_path.is_file():
              return ''
            try:
              with manifest_path.open(encoding='utf-8') as fp:
                payload = json.load(fp)
            except Exception:
              return ''
            value = payload.get('wled_ref', '')
            return value if isinstance(value, str) else str(value)

          includes = []

          if event_name == 'workflow_dispatch':
            includes.append({
              'target': os.environ.get('INPUT_TARGET', 'seeed-xiao-esp32s3'),
              'version': os.environ.get('INPUT_VERSION', 'v16'),
              'environment': os.environ.get('INPUT_ENVIRONMENT', ''),
              'wled_ref': manifest_wled_ref(
                os.environ.get('INPUT_TARGET', 'seeed-xiao-esp32s3'),
                os.environ.get('INPUT_VERSION', 'v16'),
              ),
            })
          else:
            changed_files = []
            if event_name == 'pull_request':
              base_sha = os.environ.get('PR_BASE_SHA', '')
              head_sha = os.environ.get('PR_HEAD_SHA', '')
              if base_sha and head_sha:
                changed_files = run_cmd(['git', 'diff', '--name-only', base_sha, head_sha])
            elif event_name == 'push':
              before_sha = os.environ.get('PUSH_BEFORE_SHA', '')
              after_sha = os.environ.get('PUSH_AFTER_SHA', '')
              if before_sha and before_sha != '0' * 40:
                changed_files = run_cmd(['git', 'diff', '--name-only', before_sha, after_sha])
              elif after_sha:
                changed_files = run_cmd(['git', 'show', '--pretty=', '--name-only', after_sha])

            selected = set()
            for path in changed_files:
              parts = pathlib.PurePosixPath(path).parts
              if len(parts) < 3 or parts[0] != 'targets':
                continue
              target_name = parts[1]
              scope = parts[2]
              if scope == 'shared':
                for version_name in versions_for_target(target_name):
                  selected.add((target_name, version_name))
              else:
                version_name = scope
                candidate_dir = targets_root / target_name / version_name
                if is_version_overlay_dir(candidate_dir):
                  selected.add((target_name, version_name))

            for target_name, version_name in sorted(selected):
              includes.append({
                'target': target_name,
                'version': version_name,
                'environment': manifest_environment(target_name, version_name),
                'wled_ref': manifest_wled_ref(target_name, version_name),
              })

          matrix = {'include': includes}
          output_path = os.environ['GITHUB_OUTPUT']
          with open(output_path, 'a', encoding='utf-8') as fp:
            fp.write(f"count={len(includes)}\n")
            fp.write("matrix<<EOF\n")
            fp.write(json.dumps(matrix))
            fp.write("\nEOF\n")

          print('Resolved build matrix:', json.dumps(matrix, indent=2))
          PY

      - name: No changed target overlays
        if: steps.resolve.outputs.count == '0' && github.event_name != 'workflow_dispatch'
        run: |
          echo "No target/version overlay changes detected under targets/."
          echo "Skipping Build Target Firmware matrix for this ${{ github.event_name }} event."

  build:
    name: build (${{ matrix.target }}, ${{ matrix.wled_ref != '' && matrix.wled_ref || matrix.version }}, ${{ matrix.environment != '' && matrix.environment || 'auto-env' }})
    needs: resolve-targets
    if: needs.resolve-targets.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-targets.outputs.matrix) }}
    permissions:
      contents: write
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ matrix.version }}
      REQUESTED_ENV: ${{ matrix.environment }}
      RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          
      - name: Install PlatformIO + esptool
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio esptool
          
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini', 'platformio*.ini', 'targets/**/platformio.env.ini', 'targets/**/platformio-env.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install build dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Build target in temporary workspace
        id: build
        run: |
          build_args=(--target "$TARGET" --version "$VERSION" --keep-workspace)
          if [ -n "$REQUESTED_ENV" ]; then
            build_args+=(--environment "$REQUESTED_ENV")
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            build_args+=(--plan)
          fi
          bash scripts/build-target.sh "${build_args[@]}"

      - name: Guard generated headers remain unchanged in checkout
        if: always()
        run: |
          if ! git diff --quiet -- wled00/html_*.h wled00/js_*.h; then
            echo "Generated header files changed in the checkout (wled00/html_*.h or wled00/js_*.h)."
            echo "These are auto-generated web UI outputs and must not be mutated by build-target flow changes."
            echo "Update web UI sources under wled00/data and run the dedicated web build flow when regeneration is intentional."
            git --no-pager diff -- wled00/html_*.h wled00/js_*.h
            exit 1
          fi

      - name: Upload build logs artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.TARGET }}-${{ env.VERSION }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.build.outputs.log_dir }}
          if-no-files-found: error

      - name: Upload build outputs artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.TARGET }}-${{ env.VERSION }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.build.outputs.output_dir }}
          if-no-files-found: error

      - name: Package firmware artifacts
        id: package
        if: github.event_name != 'pull_request'
        run: |
          workspace="${{ steps.build.outputs.workspace }}"
          environment="${{ steps.build.outputs.environment }}"
          wled_ref="${{ steps.build.outputs.wled_ref }}"
          publish_suffix="${{ steps.build.outputs.publish_suffix }}"
          build_dir="${{ steps.build.outputs.build_dir }}"
          output_dir="${{ steps.build.outputs.output_dir }}"

          [ -d "$workspace" ] || { echo "Missing workspace: $workspace"; exit 1; }
          [ -d "$build_dir" ] || { echo "Missing build directory: $build_dir"; exit 1; }
          [ -d "$output_dir" ] || { echo "Missing output directory: $output_dir"; exit 1; }

          if [ -z "$publish_suffix" ]; then
            publish_suffix="default"
          fi
          if [ -z "$wled_ref" ]; then
            wled_ref="${{ matrix.wled_ref }}"
          fi
          if [ -z "$wled_ref" ]; then
            wled_ref="$VERSION"
          fi

          artifact_name="firmware-${TARGET}-${VERSION}-${environment}"
          artifact_dir="$RUNNER_TEMP/$artifact_name"
          mkdir -p "$artifact_dir"

          for file in firmware.bin bootloader.bin partitions.bin; do
            if [ -f "$build_dir/$file" ]; then
              cp "$build_dir/$file" "$artifact_dir/"
            fi
          done

          release_dir="$output_dir/release"
          if [ -d "$release_dir" ]; then
            shopt -s nullglob
            app_bins=("$release_dir"/*.bin)
            shopt -u nullglob

            app_bin=""
            full_bin=""
            for candidate in "${app_bins[@]}"; do
              base_name="$(basename "$candidate")"
              if [[ "$base_name" == *.full.bin ]]; then
                if [ -z "$full_bin" ]; then
                  full_bin="$candidate"
                fi
              else
                if [ -z "$app_bin" ]; then
                  app_bin="$candidate"
                fi
              fi
            done

            if [ -n "$app_bin" ]; then
              cp "$app_bin" "$artifact_dir/wled-${VERSION}-${TARGET}-${publish_suffix}.app.bin"
            fi
            if [ -n "$full_bin" ]; then
              cp "$full_bin" "$artifact_dir/wled-${VERSION}-${TARGET}-${publish_suffix}.full.bin"
            fi
          fi

          [ -f "$artifact_dir/firmware.bin" ] || { echo "firmware.bin was not produced in $build_dir"; exit 1; }

          printf 'target=%s\nversion=%s\nwled_ref=%s\nenvironment=%s\npublish_suffix=%s\nbuild_dir=%s\n' \
            "$TARGET" "$VERSION" "$wled_ref" "$environment" "$publish_suffix" "$build_dir" > "$artifact_dir/build-metadata.txt"

          if [ -n "$RELEASE_TAG_INPUT" ]; then
            release_tag="$RELEASE_TAG_INPUT"
          else
            short_sha="${GITHUB_SHA:-}"
            if [ -n "$short_sha" ]; then
              short_sha="${short_sha:0:7}"
            else
              short_sha="$(git rev-parse --short=7 HEAD)"
            fi
            release_tag="${TARGET}-${VERSION}-${environment}-${short_sha}"
          fi

          release_files=()
          for file in firmware.bin bootloader.bin partitions.bin build-metadata.txt; do
            if [ -f "$artifact_dir/$file" ]; then
              release_files+=("$artifact_dir/$file")
            fi
          done
          for file in "wled-${VERSION}-${TARGET}-${publish_suffix}.app.bin" "wled-${VERSION}-${TARGET}-${publish_suffix}.full.bin"; do
            if [ -f "$artifact_dir/$file" ]; then
              release_files+=("$artifact_dir/$file")
            fi
          done

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          printf 'release_files<<EOF\n%s\nEOF\n' "$(printf '%s\n' "${release_files[@]}")" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Generate release notes
        id: release_notes
        if: (github.event_name == 'workflow_dispatch' && inputs.create_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'release'))
        run: |
          notes_file="$RUNNER_TEMP/release-notes-${TARGET}-${VERSION}.md"
          release_kind="stable"
          if [[ "${{ (github.event_name == 'workflow_dispatch' && inputs.legacy_release) || (github.event_name == 'push' && contains(github.event.head_commit.message, 'legacy')) }}" == "true" ]]; then
            release_kind="legacy"
          fi
          {
            echo "## Firmware Release"
            echo
            echo "- Target: ${TARGET}"
            echo "- Version: ${VERSION}"
            echo "- PlatformIO environment: ${{ steps.build.outputs.environment }}"
            echo "- Publish suffix: ${{ steps.build.outputs.publish_suffix }}"
            echo "- Release kind: ${release_kind}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "## Included Files"
            while IFS= read -r file_path; do
              [ -n "$file_path" ] || continue
              echo "- $(basename \"$file_path\")"
            done <<< "${{ steps.package.outputs.release_files }}"
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: (github.event_name == 'workflow_dispatch' && inputs.create_release) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'release'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          name: ${{ ((github.event_name == 'workflow_dispatch' && inputs.legacy_release) || (github.event_name == 'push' && contains(github.event.head_commit.message, 'legacy'))) && format('LEGACY {0}', steps.package.outputs.release_tag) || steps.package.outputs.release_tag }}
          files: ${{ steps.package.outputs.release_files }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          generate_release_notes: false
          prerelease: ${{ (github.event_name == 'workflow_dispatch' && inputs.legacy_release) || (github.event_name == 'push' && contains(github.event.head_commit.message, 'legacy')) }}
          make_latest: ${{ ((github.event_name == 'workflow_dispatch' && inputs.legacy_release) || (github.event_name == 'push' && contains(github.event.head_commit.message, 'legacy'))) && 'false' || 'true' }}

      - name: Cleanup temporary workspace
        if: always()
        run: |
          workspace="${{ steps.build.outputs.workspace }}"
          if [ -n "$workspace" ] && [[ "$workspace" == /tmp/* ]]; then
            rm -rf "$workspace"
          fi
