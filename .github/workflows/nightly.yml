
name: Deploy Nightly
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wled_build:
    if: false # Disabled: use build-target.yml only
    uses: ./.github/workflows/build.yml
  nightly:
    if: false # Disabled: use build-target.yml only
    name: Deploy nightly
    runs-on: ubuntu-latest
    needs: wled_build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          merge-multiple: true
      - name: Show Files
        run: ls -la
      - name: "✏️ Generate release changelog"
        id: changelog
        uses: janheinrichmerker/action-github-changelog-generator@v2.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 
          sinceTag: v0.15.0
          output: CHANGELOG_NIGHTLY.md
          # Exclude issues that were closed without resolution from changelog
          excludeLabels: 'stale,wontfix,duplicate,invalid,external,question,use-as-is,not_planned'
      - name: Update Nightly Release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: 'Nightly Release $$'
          prerelease: true
          body_path: CHANGELOG_NIGHTLY.md
          files: |
            *.bin
            *.bin.gz
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          repository: wled/WLED-WebInstaller
          event-type: release-nightly
          token: ${{ secrets.PAT_PUBLIC }}
