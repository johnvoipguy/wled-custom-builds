; Waveshare ESP32S3 Ethernet — target-owned PlatformIO environment fragment
;
; SOURCE OF TRUTH: targets/waveshare-esp32s3-eth/shared/platformio.env.ini
;
; This file is the canonical definition for the waveshare_esp32s3_eth build
; environment. The matching entry in the root platformio.ini is kept for CI
; compatibility, but this file is the authoritative reference for Waveshare
; target-specific build metadata.
;
; Layering model:
;   root platformio.ini                  — generic WLED base / upstream defaults
;   targets/<target>/shared/             — target source of truth  <-- THIS FILE
;   targets/<target>/v15/                — version-specific deltas and preserved assets
;
; Usage with apply-target.sh:
;   scripts/apply-target.sh --target waveshare-esp32s3-eth --version v15 --workspace <path>
;   (copies this file to <workspace>/platformio.env.ini for reference / extra_configs use)

[env:waveshare_esp32s3_eth]
extends = env:esp32s3dev_8MB_opi
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
build_flags = ${common.build_flags} ${esp32s3.build_flags} -D WLED_RELEASE_NAME=\"WAVESHARE-ESP32S3-ETH\"
  -D WLED_WATCHDOG_TIMEOUT=0
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=1
  -D BOARD_HAS_PSRAM
  -D WLED_USE_W5500
  -D WLED_ETH_DEFAULT=13
  -D W5500_MISO_PIN=12
  -D W5500_MOSI_PIN=11
  -D W5500_SCLK_PIN=13
  -D W5500_CS_PIN=14
  -D W5500_INT_PIN=10
  -D W5500_RST_PIN=9
board_build.partitions = ${esp32.extreme_partitions}
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
monitor_filters = esp32_exception_decoder
