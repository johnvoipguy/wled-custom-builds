[env:seeed_xiao_esp32s3v2]
board_build.arduino.memory_type = qio_opi
board = esp32-s3-devkitc-1
extends = env:esp32s3dev_8MB_opi
platform = ${esp32s3.platform}
platform_packages = ${esp32s3.platform_packages}
build_flags =
 ${env:esp32s3dev_8MB_opi.build_flags}
 ${esp32s3.build_flags}
 -D MQTT_MAX_PACKET_SIZE=1024
 -D SECURE_CLIENT=SECURE_CLIENT_BEARSSL
 -D BEARSSL_SSL_BASIC
 -D CORE_DEBUG_LEVEL=0
 -D _IR_ENABLE_DEFAULT_=false
 -D DECODE_HASH=true
 -D DECODE_NEC=true
 -D DECODE_SONY=true
 -D DECODE_SAMSUNG=true
 -D DDECODE_LG=true
 -D WLED_USE_MY_CONFIG
 -D WLED_PS_DONT_REPLACE_FX
 -D ESP32
 -D ARDUINO_ARCH_ESP32
 -D ARDUINO_ARCH_ESP32S3
 -D CONFIG_IDF_TARGET_ESP32S3=1
 -D ARDUINO_USB_MSC_ON_BOOT=0
 -D ARDUINO_DFU_ON_BOOT=0
 -D CO
 -D CONFIG_ASYNC_TCP_USE_WDT=0
 -D CONFIG_ASYNC_TCP_STACK_SIZE=8192
 -D WLED_ENABLE_GIF
 -D WLED_ENABLE_DMX_INPUT
 -D WLED_WATCHDOG_TIMEOUT=0
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D BOARD_HAS_PSRAM
 -D WLED_RELEASE_NAME=\"XIAO-ESP32S3\"
 -D WLED_DISABLE_ESPNOW 
 -D WLED_AP_SSID_UNIQUE 
 -D WLED_ENABLE_MQTT 
 -D WLED_DISABLE_LOXONE 
 -D WLED_DISABLE_ALEXA 
 -D WLED_DISABLE_HUESYNC
 -D DATA_PINS=1,2,3,4
 -D WLED_PRODUCT_NAME='\"Wateefy\"'
 -D USERMOD_INTERNAL_TEMPERATURE
 -D USERMOD_WIZLIGHTS
 -D WLED_PRODUCT_NAME='"Wateefy LED Controllers"'
custom_usermods =  Internal_Temperature sht wizlights AHT10
lib_deps = 
 ${esp32s3.lib_deps} 
 esp32async/AsyncTCP@3.4.7
 bitbank2/AnimatedGIF@^1.4.7
 https://github.com/Aircoookie/GifDecoder.git#bc3af189b6b1e06946569f6b4287f0b79a860f8e
 https://github.com/Makuna/NeoPixelBus.git#a0919d1c10696614625978dd6fb750a1317a14ce
 https://github.com/Aircoookie/ESPAsyncWebServer.git#v2.4.2
 marvinroger/AsyncMqttClient@0.9.0
 https://github.com/blazoncek/QuickESPNow.git#optional-debug
 crankyoldgit/IRremoteESP8266@^2.8.6
 
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = tools/WLED_ESP32_8MB.csv
monitor_filters = esp32_exception_decoder